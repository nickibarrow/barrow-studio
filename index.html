<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barrow Studio | Coming Soon</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200;6..72,300;6..72,400;6..72,500&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        headline: ["Newsreader", "serif"],
                        body: ["Work Sans", "sans-serif"],
                    },
                    colors: {
                        primary: "#610000",
                        "primary-container": "#8b0000",
                        secondary: "#50652a",
                        "secondary-container": "#cfe99f",
                        "on-secondary-container": "#546a2e",
                        background: "#fcf9f1",
                        surface: "#fcf9f1",
                        "surface-container-low": "#f6f3eb",
                        "surface-container-highest": "#e5e2db",
                        "on-surface": "#1c1c17",
                        "on-surface-variant": "#5a403c",
                        "outline-variant": "#e3beb8",
                        bone: "#fcf9f1",
                    },
                },
            },
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            html {
                font-size: 16px;
            }

            @media (min-width: 768px) {
                html {
                    font-size: 12px;
                }
            }

            body {
                @apply bg-background text-on-surface font-body antialiased;
                cursor: none;
            }

            a, button, [role="button"], .cursor-pointer, input, select, textarea {
                cursor: none !important;
            }

            h1, h2, h3, h4, h5, h6 {
                @apply font-headline;
            }
        }

        @layer utilities {
            .backdrop-blur-xl {
                backdrop-filter: blur(24px);
            }

            .ghost-border {
                border: 1px solid rgba(227, 190, 184, 0.15);
            }

            .ghost-border-hover:hover {
                border: 1px solid rgba(227, 190, 184, 0.3);
            }

            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            .custom-cursor-trail {
                transition: width 0.25s cubic-bezier(0.16, 1, 0.3, 1), 
                            height 0.25s cubic-bezier(0.16, 1, 0.3, 1), 
                            background-color 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .animate-fade-in-up {
                animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Force Babel Standalone to use the classic JSX transform (React.createElement)
        // because we are loading React from a global UMD CDN link rather than as an ES module.
        if (window.Babel) {
            Babel.registerPreset('react-classic', {
                presets: [
                    Babel.availablePresets['env'],
                    [Babel.availablePresets['react'], { runtime: 'classic' }]
                ]
            });
        }
    </script>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect } = React;

        // --- Icons ---
        const InstagramIcon = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>
            </svg>
        );

        const MailIcon = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
        );

        const ArrowRightIcon = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </svg>
        );

        // --- Components ---

        const CustomCursor = () => {
            // Track actual mouse position
            const [mousePos, setMousePos] = useState({ 
                x: typeof window !== 'undefined' ? window.innerWidth / 2 : 0, 
                y: typeof window !== 'undefined' ? window.innerHeight / 2 : 0 
            });
            
            // Track smoothed (lerped) cursor position
            const [pos, setPos] = useState({ x: mousePos.x, y: mousePos.y });
            const [isHovering, setIsHovering] = useState(false);
            const [isWhite, setIsWhite] = useState(false);
            const [transform, setTransform] = useState({ angle: 0, squish: 0 });

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };

                const handleMouseOver = (e) => {
                    const target = e.target;
                    if (!target) return;
                    
                    // Detect links, buttons, or interactive elements to trigger hover style
                    const interactive = target.closest('a, button, [role="button"], .cursor-pointer');
                    setIsHovering(!!interactive);
                    
                    // Detect dark backgrounds with [data-cursor-white="true"] to flip cursor color to white
                    const darkArea = target.closest('[data-cursor-white="true"]');
                    setIsWhite(!!darkArea);
                };

                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseover', handleMouseOver);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseover', handleMouseOver);
                };
            }, []);

            useEffect(() => {
                let animationFrameId;
                const LERP = 0.28; // Control's fluid catch-up speed

                const tick = () => {
                    setPos(prev => {
                        // Calculate velocity vector for direction and dynamic stretching/squishing
                        const vx = (mousePos.x - prev.x) * LERP;
                        const vy = (mousePos.y - prev.y) * LERP;
                        const newX = prev.x + vx;
                        const newY = prev.y + vy;

                        const speed = Math.sqrt(vx * vx + vy * vy);
                        const squish = Math.min(speed * 0.04, 0.4);
                        const angle = Math.atan2(vy, vx) * (180 / Math.PI);

                        setTransform({ angle, squish });

                        return { x: newX, y: newY };
                    });
                    animationFrameId = requestAnimationFrame(tick);
                };

                tick();
                return () => cancelAnimationFrame(animationFrameId);
            }, [mousePos]);

            return (
                <div 
                    className={`fixed top-0 left-0 w-[40px] h-[40px] border-2 rounded-full pointer-events-none z-[999999] will-change-transform transition-[border-color,background-color] duration-300 ${
                        isWhite ? 'border-white' : 'border-[#50652a]'
                    }`}
                    style={{
                        transform: `translate(${pos.x - 20}px, ${pos.y - 20}px) rotate(${transform.angle}deg) scale(${1 + transform.squish}, ${1 - transform.squish * 0.5})`,
                        backgroundColor: isHovering 
                            ? (isWhite ? 'rgba(255, 255, 255, 0.2)' : 'rgba(80, 101, 42, 0.2)') 
                            : 'transparent'
                    }}
                />
            );
        };

        function App() {
            return (
                <div className="min-h-screen bg-background flex flex-col selection:bg-secondary/20 selection:text-primary">
                    <CustomCursor />
                    
                    {/* Background Elements */}
                    <div className="fixed inset-0 pointer-events-none overflow-hidden opacity-80">
                    </div>

                    <main className="flex-grow flex flex-col items-center justify-center px-6 py-20 relative z-10">
                        <div className="text-center max-w-2xl animate-fade-in-up">
                            <h1 className="mb-4 flex justify-center overflow-hidden">
                                <img 
                                    src="/Logo-2.png" 
                                    alt="Barrow Studio" 
                                    className="w-full max-w-[600px] h-auto -my-8 md:-my-12"
                                    referrerPolicy="no-referrer"
                                />
                            </h1>
                            
                            <div className="h-px w-24 bg-primary/20 mx-auto mb-6" />
                            
                            <p className="text-base md:text-xl font-headline text-on-surface-variant mb-16 leading-relaxed text-center">
                                A digital gallery. Coming soon.
                            </p>
                        </div>
                    </main>

                    <footer className="py-12 px-8 relative z-10">
                        <div className="max-w-[1440px] mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="flex gap-8 font-body text-[10px] uppercase tracking-[0.3em] text-on-surface/60">
                                <a href="https://www.instagram.com/barrow.studio?igsh=MWFwaDhwaDVwMm5ieA%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer" className="hover:text-primary transition-colors flex items-center gap-2">
                                    <InstagramIcon size={14} /> Instagram
                                </a>
                            </div>
                            
                            <div className="text-[10px] uppercase tracking-[0.3em] text-on-surface/40 font-body">
                                © 2026 Barrow Studio. All rights reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
